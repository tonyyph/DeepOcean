<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deep Ocean App Store Screenshots</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #050b14;
        color: #f4fbff;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
      }

      header {
        padding: 40px 36px 20px;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      p {
        margin: 8px 0 0;
        color: rgba(244, 251, 255, 0.62);
        font-size: 15px;
      }

      main {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 28px;
        padding: 20px 36px 48px;
      }

      figure {
        margin: 0;
      }

      img {
        display: block;
        width: 100%;
        border-radius: 18px;
        box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42);
      }

      figcaption {
        padding-top: 10px;
        color: rgba(244, 251, 255, 0.58);
        font-size: 13px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Deep Ocean App Store Screenshots</h1>
      <p>Professional 6.9-inch iPhone exports: 1290 x 2796 PNG.</p>
    </header>
    <main>
      <figure><img src="pro/deep-ocean-pro-01.png" alt="Deep Ocean App Store screenshot 1" /><figcaption>01</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-02.png" alt="Deep Ocean App Store screenshot 2" /><figcaption>02</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-03.png" alt="Deep Ocean App Store screenshot 3" /><figcaption>03</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-04.png" alt="Deep Ocean App Store screenshot 4" /><figcaption>04</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-05.png" alt="Deep Ocean App Store screenshot 5" /><figcaption>05</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-06.png" alt="Deep Ocean App Store screenshot 6" /><figcaption>06</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-07.png" alt="Deep Ocean App Store screenshot 7" /><figcaption>07</figcaption></figure>
      <figure><img src="pro/deep-ocean-pro-08.png" alt="Deep Ocean App Store screenshot 8" /><figcaption>08</figcaption></figure>
    </main>
  </body>
</html>
